<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Pop メイン</title>
    <!-- CSS読み込み -->
    <link rel="stylesheet" href="css/style.css">
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Noto+Sans+JP:wght@100..900&family=Zen+Kaku+Gothic+Antique&family=Zen+Kaku+Gothic+New&family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
    <!-- CDN 読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/script.js" defer></script>
</head>
<body>
    <div calss="sub-area">
        <p>2025年5月15日</p>
        <input type="button" value="月報出力">
        <button onclick="showLogin()">ログイン</button>
    </div>
    <main>
        <div class="member">
            <table>
                <tr>
                    <th>利用者番号</th>
                    <th>名前</th>
                    <th colspan="2">出勤</th>
                    <th colspan="2">退勤</th>
                </tr>
                <tr>
                    <td>a</td>
                    <td>b</td>
                    <td>c</td>
                    <td>d</td>
                    <td>e</td>
                    <td>f</td>
                </tr>
            </table>
        </div>
        <div class="register-action">
            <form action="Inter" method="post">
                <input type="submit" value="出勤" name="inter">
            </form>
            <form action="Enter" method="post">
                <input type="submit" value="出勤" name="inter">
            </form>
        </div>
    </main>
</body>
</html>
