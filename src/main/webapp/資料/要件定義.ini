要件定義
タイムカード打刻+手作業での計算を毎月行っている

ジョブリッジ管理者のログイン（職員さんが朝出勤した時に打刻）
    ログインID：メールアドレス形式のみ許可
    パスワード：6文字以上の小文字英数字のみ許可
    パスワード変更
出退勤のメインページ
    【メインエリア】
        ジョブリッジ利用者の
        ・利用者番号
        ・名前一覧（ひらがな）
        ・出退ボタン
        ・出勤時間
        ・退勤ボタン
        ・退勤時間
            出勤時
                出勤ボタン押下
                「おはようございます」の出力
                出勤時間の反映
                出勤ボタンが押されていない場合、退勤ボタンを押せないように（誤操作防止）
            退勤時
                退勤ボタン押下
                「おつかれさまでした」の出力
                退勤時間の反映
                出勤ボタンが押されてて、退勤ボタンが押されていない場合、出勤ボタンは押せないように（誤操作防止）
    【サブエリア】
        現在の日付
        月次一覧の取得
            Excelやスプレットシートのテンプレートへの出力
            欲しい情報
                締め日（末締め・10日締めとか）
                誰が出力操作する？（職員さん？利用者さん？）
        ジョブリッジ管理者のログイン
            ログインID
            パスワード
            パスワードの変更
                出退勤訂正ボタン（他者の出退勤ボタンを押してしまった場合・打刻忘わすれなど）
                    誰の情報を訂正するかの選択
                    選択した人の出退勤時間の一覧を取得し表示
                    出勤時間または退勤時間の手入力（未入力の場合、変更しない）
                    変更内容確認ボタン（ウィンドで入力した内容の出力）
                    変更内容実行ボタン（上記ウィンドの中に作成）
                    登録完了ウィンドの出力
                    他にも登録するかの確認ウィンドの出力（はいの場合、）
                    ※問題※
                        当日分の修正と、後日分の修正を考える必要がある？
                利用者情報ボタン（検索・登録・変更・対象除外・削除のボタンを右下とかにつけたらどう？）
                    ・利用者番号（検索ボタン押下後、情報出力）
                    ・名前（漢字）
                    ・名前（ひらがな）
                    ・時給
                    ・交通費
                管理者情報ボタン
                    ・管理者番号（検索ボタン押下後、情報出力）
                    ・名前（漢字）
                    ・名前（ひらがな）
                    ・メールアドレス（パスワード変更用）
                    ・パスワード（マスターキーとかで見れるように？）
                パスワード再設定ボタン
                    ・管理者番号を入力でパスワード再設定のメールを登録済みメールアドレスに送信


データベース
1 usersテーブル

id      int              主キー
name    varchar     名前
email   varchar     管理者ログイン用メール
passward    vachar
                
